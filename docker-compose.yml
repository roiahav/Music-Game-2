version: '3.8'
services:
  music-game:
    image: music-game:latest
    container_name: music-game
    ports:
      - "3000:3000"
    volumes:
      # תיקיית ה-MP3 על ה-QNAP (שנה לנתיב הנכון)
      - /share/Multimedia/Music:/music:ro
      # שמירת נתונים (משתמשים, הגדרות, לוג) בין הפעלות
      - /share/homes/admin/music-game-data:/app/server/data
    restart: unless-stopped
    environment:
      - PORT=3000
